<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmergencyZA | T⁴Tech</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white max-w-md mx-auto min-h-screen flex flex-col">
    <nav class="p-6 border-b border-slate-800 flex justify-between items-center bg-slate-950 sticky top-0">
        <h1 class="font-black text-red-500 italic uppercase tracking-tighter text-xl">T⁴ EmergencyZA</h1>
        <div class="h-2 w-2 rounded-full bg-red-500 animate-ping"></div>
    </nav>

    <main class="p-6 space-y-6 flex-grow">
        <div class="bg-red-600/10 border border-red-600/20 p-6 rounded-3xl text-center">
            <h2 class="text-3xl font-black mb-2">PANIC BUTTON</h2>
            <p class="text-[10px] uppercase font-bold text-red-400 tracking-widest">Instant WhatsApp Broadcast</p>
            <button onclick="triggerPanic()" class="mt-8 h-40 w-40 bg-red-600 rounded-full border-8 border-red-900/50 shadow-[0_0_50px_rgba(220,38,38,0.5)] active:scale-95 transition-all mx-auto flex items-center justify-center">
                <span class="font-black text-2xl uppercase italic">SOS</span>
            </button>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <a href="tel:10111" class="bg-slate-800 p-4 rounded-2xl border border-slate-700 text-center">
                <p class="text-[10px] font-bold opacity-50 uppercase">Police</p>
                <p class="font-black text-lg">10111</p>
            </a>
            <a href="tel:112" class="bg-slate-800 p-4 rounded-2xl border border-slate-700 text-center">
                <p class="text-[10px] font-bold opacity-50 uppercase">Ambulance</p>
                <p class="font-black text-lg">112</p>
            </a>
        </div>
    </main>

    <footer class="p-8 text-center text-slate-600 text-[10px] font-black uppercase tracking-widest italic">T⁴Tech Safety Pillar</footer>

    <script>
        function triggerPanic() {
            const msg = encodeURIComponent("🚨 T4 EMERGENCY: I need urgent help! My current location is being shared. Please respond.");
            window.open(`https://wa.me/?text=${msg}`);
        }
    </script>
</body>
</html>
